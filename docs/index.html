  <body>
    <div id="nav-container"></div>
    <div id="content"></div>
    <script>
      async function loadPartial(url) {
        const response = await fetch(url);
        let html = await response.text();

        html = html.replace(
          /<script\b[^>]*>\s*\/\/[^<]*For SVG support[\s\S]*?<\/script>/gi,
          "",
        );
        html = html.replace(
          /<script\b[^>]*>\s*(\/\*.*?\*\/|\/\/.*?\n)*\s*if\s*\(\s*['"]WebSocket['"]\s+in\s+window\s*\)[\s\S]*?<\/script>/gi,
          "",
        );

        const container = document.createElement("div");
        container.innerHTML = html;

        const scripts = Array.from(container.querySelectorAll("script"));
        scripts.forEach((script) => script.remove());

        const content = document.getElementById("content");
        while (container.firstChild) {
          content.appendChild(container.firstChild);
        }

        for (const oldScript of scripts) {
          const newScript = document.createElement("script");
          if (oldScript.type) newScript.type = oldScript.type;
          if (oldScript.src) {
            newScript.src = oldScript.src;
            newScript.async = false;
          } else if (oldScript.textContent.trim()) {
            newScript.textContent = oldScript.textContent;
          }
          document.body.appendChild(newScript);
        }
      }

      async function loadAllPartials() {
        const partials = [
          "partials/loading.html",
          "partials/nav.html",
          "partials/hero.html",
          "partials/experience.html",
          "partials/aboutme.html",
          "partials/education.html",
          "partials/projects.html",
          "partials/footer.html",
          "partials/particles.html",
          "partials/curser.html",
          "partials/pagescript.html",
          "partials/towerdefense.html",
        ];

        for (const partial of partials) {
          await loadPartial(partial);
        }
      }
      loadAllPartials();
    </script>
    <script>
      let targetAudioVolume = 1;
      let currentAudioVolume = 1;
      const audioFadeThreshold = 500;
      const audioFadeDuration = 300;
      let lastAudioUpdateTime = 0;

      function updateAudioVolumeOnScroll() {
        const scrollY = window.scrollY || window.pageYOffset;
        targetAudioVolume = Math.max(0, 1 - scrollY / audioFadeThreshold);
      }

      function smoothAudioVolumeUpdate(currentTime) {
        if (typeof audioManager === "undefined") return;

        const timeDelta = currentTime - lastAudioUpdateTime;
        if (timeDelta > audioFadeDuration) {
          currentAudioVolume = targetAudioVolume;
          lastAudioUpdateTime = currentTime;
        } else if (currentAudioVolume !== targetAudioVolume) {
          const alpha = timeDelta / audioFadeDuration;
          currentAudioVolume +=
            (targetAudioVolume - currentAudioVolume) * alpha * 0.1;
          if (Math.abs(currentAudioVolume - targetAudioVolume) < 0.01) {
            currentAudioVolume = targetAudioVolume;
          }
        }

        if (audioManager && audioManager.masterVolume !== undefined) {
          audioManager.masterVolume = currentAudioVolume;
          for (const key in audioManager.sounds) {
            if (audioManager.sounds[key]) {
              audioManager.sounds[key].volume =
                (audioManager.sounds[key]._baseVolume || 0.5) *
                currentAudioVolume;
            }
          }
        }
        requestAnimationFrame(smoothAudioVolumeUpdate);
      }

      window.addEventListener("scroll", updateAudioVolumeOnScroll, {
        passive: true,
      });

      setTimeout(() => {
        requestAnimationFrame(smoothAudioVolumeUpdate);
      }, 2000);
    </script>
  </body>
