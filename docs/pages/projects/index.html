<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects | Mohammad Taher Ahmadi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles/projects.css" />
  </head>
  <body>
    <div id="content"></div>

    <script>
      async function loadPartial(url) {
        const response = await fetch(url);
        let html = await response.text();

        // strip known dev injection scripts
        html = html.replace(
          /<script\b[^>]*>\s*\/\/[^<]*For SVG support[\s\S]*?<\/script>/gi,
          "",
        );
        html = html.replace(
          /<script\b[^>]*>\s*(\/\*.*?\*\/|\/\/.*?\n)*\s*if\s*\(\s*['\"]WebSocket['\"]\s+in\s+window\s*\)[\s\S]*?<\/script>/gi,
          "",
        );

        const container = document.createElement("div");
        container.innerHTML = html;
        const scripts = Array.from(container.querySelectorAll("script"));
        scripts.forEach((s) => s.remove());
        const content = document.getElementById("content");
        while (container.firstChild) content.appendChild(container.firstChild);

        for (const oldScript of scripts) {
          const newScript = document.createElement("script");
          if (oldScript.type) newScript.type = oldScript.type;
          if (oldScript.src) {
            newScript.src = oldScript.src;
            newScript.async = false;
          } else if (oldScript.textContent.trim())
            newScript.textContent = oldScript.textContent;
          document.body.appendChild(newScript);
        }
      }

      async function loadAllPartials() {
        const partials = [
          "../partials/loading.html",
          "../partials/nav.html",
          "../partials/particles.html",
          "../partials/curser.html",
          "../partials/pagescript.html",
        ];
        for (const p of partials) await loadPartial(p);
      }

      function renderProjects() {
        // Scroll animations
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) entry.target.classList.add("visible");
            });
          },
          { threshold: 0.1, rootMargin: "0px 0px -50px 0px" },
        );
        document
          .querySelectorAll(".fade-in")
          .forEach((el) => observer.observe(el));

        // Loading screen hide (works even if load already fired)
        function hideLoaderAndReveal() {
          setTimeout(() => {
            const l = document.getElementById("loader");
            if (l) l.classList.add("hidden");
            document
              .querySelectorAll(".fade-in")
              .forEach((el) => el.classList.add("visible"));
          }, 400);
        }
        if (document.readyState === "complete") hideLoaderAndReveal();
        else window.addEventListener("load", hideLoaderAndReveal);

        // Render projects from JSON data
        (function () {
          const grid = document.getElementById("projects-grid");
          if (!grid) return;

          fetch("./data/projects.json")
            .then((r) => r.json())
            .then((data) => {
              data.forEach((p) => {
                const el = document.createElement("div");
                el.className = "project-card fade-in";
                el.innerHTML = `
                  <div class="project-image">
                    <div class="project-icon" style="background: ${p.gradient};">
                      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="3" width="7" height="7" rx="1"></rect><rect x="3" y="14" width="7" height="7" rx="1"></rect><rect x="14" y="14" width="7" height="7" rx="1"></rect></svg>
                    </div>
                  </div>
                  <div class="project-content">
                    <h3 style="font-size: 20px; margin: 0 0 8px 0; font-weight: 600;">${p.title}</h3>
                    <p style="color: var(--text-secondary); font-size: 14px; line-height: 1.7; margin: 0 0 16px 0;">${p.description}</p>
                    <div style="display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px;">${p.tags.map((t) => `<span class="tag ${t === "C++" ? "tag-lime" : ""} ${t === "Unity" ? "tag-coral" : ""}">${t}</span>`).join("")}</div>
                    <a href="${p.link}" target="_blank" class="btn-primary">${p.btnText}</a>
                  </div>`;
                grid.appendChild(el);
              });
            })
            .catch((err) => console.error("Failed to load projects.json", err));
        })();
      }

      // Load partials, then show page content and run render
      (async function () {
        await loadAllPartials();
        const page = document.getElementById("page-content");
        const content = document.getElementById("content");
        if (page && content) {
          while (page.firstChild) content.appendChild(page.firstChild);
          renderProjects();
        }
      })();
    </script>
    <script>
      (function () {
        const cursor = document.getElementById("cursor");
        document.addEventListener("mousedown", () =>
          cursor.classList.add("clicking"),
        );
        document.addEventListener("mouseup", () =>
          cursor.classList.remove("clicking"),
        );

        document.addEventListener("mouseleave", () => {
          cursor.style.opacity = "0";
          cursorDot.style.opacity = "0";
        });
        document.addEventListener("mouseenter", () => {
          cursor.style.opacity = "1";
          cursorDot.style.opacity = "1";
        });
      })();
    </script>
  </body>
</html>
