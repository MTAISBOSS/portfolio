<canvas id="hero-canvas"></canvas>

<script>
  async function loadScript(src) {
    return new Promise((resolve, reject) => {
      const script = document.createElement("script");
      script.src = src;
      script.onload = resolve;
      script.onerror = reject;
      document.head.appendChild(script);
    });
  }

  async function initializeTowerDefense() {
    try {
      await loadScript("scripts/audiomanager.js");
      await loadScript("scripts/shaders-materials.js");
      await loadScript("scripts/scene-setup.js");
      await loadScript("scripts/tile-loading.js");
      await loadScript("scripts/turret-system.js");
      await loadScript("scripts/enemy-system.js");
      await loadScript("scripts/projectile-system.js");
      await loadScript("scripts/game-main.js");

      const canvas = document.getElementById("hero-canvas");
      if (!canvas) {
        console.error("Canvas element not found");
        return;
      }

      initializeScene(canvas);
      await initializeGame();
    } catch (error) {
      console.error("Error loading tower defense scripts:", error);
    }
  }

  initializeTowerDefense();
</script>
